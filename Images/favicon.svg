<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="oro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="45%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#e6a700"/>
    </linearGradient>
  </defs>
  <!-- fondo redondeado -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- C de Circanícula: arco abierto a la derecha -->
  <path d="M46 19.5
           A 17 17 0 1 0 46 44.5"
        fill="none"
        stroke="url(#oro)"
        stroke-width="7.5"
        stroke-linecap="round"/>
  <!-- pequeño destello/estrella superior derecha -->
  <circle cx="47.5" cy="20" r="2.6" fill="#ffe680"/>
</svg>
